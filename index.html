<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/" />
  <title>RetinaScan - Deteksi Retinopati Diabetik</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  
  <!-- Preload THREE.js untuk mengatasi masalah inisialisasi Vanta.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  
  <!-- Fallback styles untuk animasi jika JavaScript dinonaktifkan -->
  <noscript>
    <style>
      .bg-fallback {
        background: linear-gradient(-45deg, #1e3a8a, #1e40af, #1d4ed8, #3b82f6);
        background-size: 400% 400%;
        animation: gradient-shift 15s ease infinite;
      }
      @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
    </style>
  </noscript>
</head>
<body class="bg-fallback">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- Script untuk memastikan THREE.js tersedia secara global -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // Pastikan THREE tersedia secara global
      if (typeof THREE === 'undefined' && typeof window.THREE !== 'undefined') {
        window.THREE = window.THREE;
      }
      
      // Tambahkan class untuk menunjukkan bahwa JavaScript aktif
      document.body.classList.add('js-enabled');
    });
  </script>
</body>
</html>
